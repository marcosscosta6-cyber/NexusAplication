<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus — Conexões</title> 

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="conec.css">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
</head>
<body>
    <div class="layout">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo">
                <img src="../Img/NexusS.png" alt="" width="45px" height="45px">
                <h2>Nexus</h2>
            </div>

            <br><br>
            
            <div class="perfil-sidebar">
                <img src="../Img/download 3.svg">
                <div class="text-white">
                    <h5>Mariana Costa</h5>
                    <p>Engenheira mecânica</p>
                </div>
            </div>
            <nav class="menu">
                <a href="../home/home.html">
                    <i class="fa-solid fa-house"></i><span>Início</span>
                </a>
                <a href="../explorar/explorar.html">
                    <i class="fa-solid fa-magnifying-glass"></i><span>Explorar</span>
                </a>
                <a href="../conexões/conec.html" class="active">
                    <i class="fa-solid fa-users"></i><span>Conexões</span>
                </a>
                <a href="../mensagens/mensagens.html">
                    <i class="fa-solid fa-message"></i><span>Mensagens</span>
                </a>
                <a href="../projetos/projetos.html">
                    <i class="fa-solid fa-folder"></i><span>Projetos</span>
                </a>
                <a href="../notificações/not.html">
                    <i class="fa-solid fa-bell"></i><span>Notificações</span>
                </a>
                <a href="../perfil/perfil.html">
                    <i class="fa-solid fa-user"></i><span>Perfil</span>
                </a>
            </nav>
            
            <div class="bottom-menu">
                <a href="../config/config.html">
                    <i class="fa-solid fa-gear"></i><span>Configurações</span>
                </a>
                <button id="Sair" class="btn botaosair">
                        <i class="fa-solid fa-right-from-bracket"></i>
                        <span>Sair</span>
                </button>
            </div>
        </aside>

        <!-- CONTEÚDO -->
        <div class="content">
            <header>
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Buscar no Nexus...">
                </div>
                <div class="header-right">
                    <a class="notificacao" href="../notificações/not.html">
                        <i class="fa-solid fa-bell"></i>
                    </a>

                    <a class="user" href="../perfil/perfil.html">
                        <span>Olá, Arthur!</span>
                    </a>
                </div>
            
            </header>

            <main class="main-content">

                <div class="page-header">
                    <h1>Minhas Conexões</h1>
                    <button class="btn-gerenciar">Gerenciar</button>
                </div>

                <!-- ABAS -->
                <div class="abas">
                    <button class="aba" onclick="trocarAba(this,'todos')">Todos <span class="badge-count">12</span></button>
                    <button class="aba active" onclick="trocarAba(this,'solicitacoes')">Solicitações <span class="badge-count">2</span></button>
                    <button class="aba" onclick="trocarAba(this,'enviados')">Enviados</button>
                </div>

                <!-- CONTEÚDO DAS ABAS -->
                <div class="conexoes-lista" id="lista-conexoes">
                    <!-- preenchido pelo JS ao carregar -->
                </div>

            </main>
        </div>
    </div>

    <div class="overlay" id="overlay">

        <div class="mesmosair">
            <p>Certeza que você quer <span>sair?</span> </p>

            <div class="sae">
            <Button class="btn btn-sim" onclick=sim()>Sim</Button> 
            <button class="btn btn-sair" onclick=nao()>Não</button>
            </div>
        </div>
    </div> 
        
        <script src="conec.js"></script>
        <script src="../sair.js"></script>
</body>
</html>
